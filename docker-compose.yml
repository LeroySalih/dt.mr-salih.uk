services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/dino?sslmode=disable
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    external: true
